blueprint:
  name: |
    Aivi: Generic activity — timer helper
  description: |
    Updates an Aivi Live Activity from a Home Assistant timer entity using the Generic template.

    See the [docs](https://docs.getaivi.app/templates/#generic-template) for more info about the template.

  domain: automation
  input:
    slug:
      name: Activity slug
      description: The slug of the activity

    timer:
      name: Timer
      description: The timer entity that will drive the progression of the live activity.
      selector:
        entity:
          filter:
            - domain: timer

    human_state:
      name: Human-readable activity state
      default:
      description: |
        An optional, human readable activity state to be displayed in the live activity.

        If omitted, the timer state will be automatically mapped to the following states: "In progress", "Paused" or "Done".

        Note that, due to a limitation in Home Assistant, the change to this sensor will not be immediately be reflected in the Live Activity and instead will be baked into the next scheduled update.
      selector:
        entity:
          filter:
            - domain: sensor
            - domain: input_select
            - domain: text

    icon:
      name: Icon
      description: |
        An [SF Symbols](https://developer.apple.com/sf-symbols/) icon. Example: washer.

    icon_customization:
      name: Icon customization
      icon: mdi:palette
      description: |
        Advanced rendering options for the SF Symbol icon. Leave at defaults
        for the standard monochrome appearance.
      input:
        icon_rendering_mode:
          name: Rendering mode
          default: default
          selector:
            select:
              mode: dropdown
              options:
                - label: Default
                  value: default
                - label: Monochrome
                  value: monochrome
                - label: Hierarchical
                  value: hierarchical
                - label: Palette
                  value: palette
                - label: Multicolor
                  value: multicolor

        icon_primary_color:
          name: Primary color
          default: default
          selector:
            select:
              options:
                - default
                - red
                - orange
                - yellow
                - green
                - mint
                - teal
                - cyan
                - blue
                - indigo
                - purple
                - pink
                - brown
                - gray
                - gray2
                - gray3
                - gray4
                - gray5
                - gray6

        icon_secondary_color:
          name: Secondary color (palette mode)
          default: default
          selector:
            select:
              options:
                - default
                - red
                - orange
                - yellow
                - green
                - mint
                - teal
                - cyan
                - blue
                - indigo
                - purple
                - pink
                - brown
                - gray
                - gray2
                - gray3
                - gray4
                - gray5
                - gray6

        icon_tertiary_color:
          name: Tertiary color (palette mode)
          default: default
          selector:
            select:
              options:
                - default
                - red
                - orange
                - yellow
                - green
                - mint
                - teal
                - cyan
                - blue
                - indigo
                - purple
                - pink
                - brown
                - gray
                - gray2
                - gray3
                - gray4
                - gray5
                - gray6

        icon_color_rendering:
          name: Color rendering
          default: default
          selector:
            select:
              mode: dropdown
              options:
                - label: Default
                  value: default
                - label: Flat
                  value: flat
                - label: Gradient
                  value: gradient

    tap_url:
      name: Tap URL
      icon: mdi:link
      input:
        tap_url_template:
          name: Tap URL (template)
          default: ""
          description: |
            A Jinja2 template for the URL opened when the Live Activity is tapped.
            Supports any URL scheme (https://, homeassistant://, etc.).
          selector:
            template:

trigger_variables:
  human_state: !input human_state

triggers:
  - trigger: state
    entity_id:
      - !input timer

  - platform: template
    value_template: "{{ state_translated(human_state) if human_state is not none else None }}"

variables:
  slug: !input slug
  icon: !input icon
  icon_rendering_mode: !input icon_rendering_mode
  icon_primary_color: !input icon_primary_color
  icon_secondary_color: !input icon_secondary_color
  icon_tertiary_color: !input icon_tertiary_color
  icon_color_rendering: !input icon_color_rendering
  timer_entity: !input timer
  human_state_entity: !input human_state
  tap_url_template: !input tap_url_template

mode: restart

actions:
  - repeat:
      while:
        - condition: template
          value_template: >-
            {{ state_attr(timer_entity, "remaining") is not none }}

      sequence:
        - variables: &time
            duration: >-
              {{ as_timedelta(state_attr(timer_entity, "duration")).total_seconds() }}

            eta: >-
              {% if state_attr(timer_entity, "finishes_at") is none %}
                {% set remaining = as_timedelta(state_attr(timer_entity, "remaining")).total_seconds() %}
              {% else %}
                {% set t_now = now() %}
                {% set t_eta = as_datetime(state_attr(timer_entity, "finishes_at"), t_now) %}
                {% set remaining = (t_eta - t_now).total_seconds() %}
              {% endif %}
              {{ max(int(remaining), 0) }}

        - variables:
            progress: >-
              {{ (duration - eta) / duration }}

            human_state: >-
              {% if human_state_entity is not none %}
                {{ state_translated(human_state_entity) }}
              {% elif state_attr(timer_entity, "finishes_at") is none %}
                Paused
              {% else %}
                In progress
              {% endif %}

        - variables:
            tap_url: >-
              {{ tap_url_template|string if tap_url_template else None }}

        - action: rest_command.update_live_activity
          response_variable: aivi_response
          data:
            slug: "{{ slug }}"
            payload: >-
              {
                "state": "ONGOING",
                "content": {
                  "template": "generic",
                  "state": {{ human_state|to_json }},
                  "remaining_time": {{ eta|to_json }},
                  "progress": {{ progress|to_json }},
                  "icon": {{ ({
                    "name": icon,
                    "rendering_mode": icon_rendering_mode if icon_rendering_mode != "default" else None,
                    "primary_color": icon_primary_color if icon_primary_color != "default" else None,
                    "secondary_color": icon_secondary_color if icon_secondary_color != "default" else None,
                    "tertiary_color": icon_tertiary_color if icon_tertiary_color != "default" else None,
                    "color_rendering": icon_color_rendering if icon_color_rendering != "default" else None,
                  } if icon else None) | to_json }},
                  "tap_url": {{ tap_url|to_json }}
                }
              }

        - variables: *time

        - delay:
            seconds: >-
              {% if state_attr(timer_entity, "finishes_at") is none %}
                {{ 3600 }}
              {% else %}
                {% set progress = (duration - eta) / duration %}
                {% set next_step = progress|round(2, 'ceil') %}
                {% if next_step == progress %}
                  {% set progress_delay = duration / 100 %}
                {% else %}
                  {% set progress_delay = ((next_step - progress) * duration) %}
                {% endif %}

                {{ max(1, min(eta % 60, progress_delay)) }}
              {% endif %}

  - variables:
      human_state: >-
        {% if human_state_entity is not none %}
          {{ state_translated(human_state_entity) }}
        {% else %}
          Done
        {% endif %}

  - variables:
      tap_url: >-
        {{ tap_url_template|string if tap_url_template else None }}

  - action: rest_command.update_live_activity
    response_variable: aivi_response
    data:
      slug: "{{ slug }}"
      payload: >-
        {
          "state": "IDLE",
          "content": {
            "template": "generic",
            "state": {{ human_state|to_json }},
            "remaining_time": null,
            "progress": 1,
            "icon": {{ ({
              "name": icon,
              "rendering_mode": icon_rendering_mode if icon_rendering_mode != "default" else None,
              "primary_color": icon_primary_color if icon_primary_color != "default" else None,
              "secondary_color": icon_secondary_color if icon_secondary_color != "default" else None,
              "tertiary_color": icon_tertiary_color if icon_tertiary_color != "default" else None,
              "color_rendering": icon_color_rendering if icon_color_rendering != "default" else None,
            } if icon else None) | to_json }},
            "tap_url": {{ tap_url|to_json }}
          }
        }
