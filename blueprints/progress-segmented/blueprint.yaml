        header_left_template:
          name: Value (template)
          default: ""
          description: |
            Can be used instead of "Value (sensor)" to provide a templated value.
            If this template references entities, add matching triggers in "Custom automation triggers".
          selector:
            template:

        header_left_color:
          name: Text color
          default: default
          description: The text color for the header left slot.
          selector:
            select:
              options:
