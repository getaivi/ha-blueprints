blueprint:
  name: |
    Aivi: Progress activity using sensors (segmented)
  description: |
    Updates an Aivi Live Activity from Home Assistant sensors using the Progress template with a segmented progress bar.

    See the [docs](https://docs.getaivi.app/templates/#progress-template) for more info about the template.

  domain: automation
  homeassistant:
    min_version: 2025.7.0

  input:
    slug:
      name: Activity slug
      description: The slug of the activity.

    state:
      name: Aivi activity state
      description: A binary sensor that tells Aivi whether the activity is ongoing (on) or idle (off).
      selector:
        entity:
          filter:
            - domain: binary_sensor

    icon:
      name: Icon
      default: ""
      description: |
        An [SF Symbols](https://developer.apple.com/sf-symbols/) icon name.
        Example: washer.

    icon_customization:
      name: Icon customization
      icon: mdi:palette
      description: |
        Advanced rendering options for the SF Symbol icon. Leave at defaults
        for the standard monochrome appearance.
      input:
        icon_rendering_mode:
          name: Rendering mode
          default: default
          selector:
            select:
              mode: dropdown
              options:
                - label: Default
                  value: default
                - label: Monochrome
                  value: monochrome
                - label: Hierarchical
                  value: hierarchical
                - label: Palette
                  value: palette
                - label: Multicolor
                  value: multicolor

        icon_primary_color:
          name: Primary color
          default: default
          selector:
            select:
              options:
                - default
                - red
                - orange
                - yellow
                - green
                - mint
                - teal
                - cyan
                - blue
                - indigo
                - purple
                - pink
                - brown
                - gray
                - gray2
                - gray3
                - gray4
                - gray5
                - gray6

        icon_secondary_color:
          name: Secondary color (palette mode)
          default: default
          selector:
            select:
              options:
                - default
                - red
                - orange
                - yellow
                - green
                - mint
                - teal
                - cyan
                - blue
                - indigo
                - purple
                - pink
                - brown
                - gray
                - gray2
                - gray3
                - gray4
                - gray5
                - gray6

        icon_tertiary_color:
          name: Tertiary color (palette mode)
          default: default
          selector:
            select:
              options:
                - default
                - red
                - orange
                - yellow
                - green
                - mint
                - teal
                - cyan
                - blue
                - indigo
                - purple
                - pink
                - brown
                - gray
                - gray2
                - gray3
                - gray4
                - gray5
                - gray6

        icon_color_rendering:
          name: Color rendering
          default: default
          selector:
            select:
              mode: dropdown
              options:
                - label: Default
                  value: default
                - label: Flat
                  value: flat
                - label: Gradient
                  value: gradient

    custom_triggers:
      name: Custom automation triggers
      description: |
        Template fields do not automatically create triggers.
        Add one trigger for each entity referenced by a template field (usually a `state` trigger).
        These triggers are evaluated together with the built-in sensor triggers.
      default: []
      selector:
        trigger:

    progress:
      name: Progress
      input:
        progress_value:
          name: Progress value (sensor)
          default: sensor.dummy_non_existent_sensor
          description: |
            A sensor whose state represents the overall progress value.
            Must be a number between 0 and 1. This is the fill level across all segments.
          selector:
            entity:
              filter:
                - domain: sensor

        progress_value_template:
          name: Progress value (template)
          default: ""
          description: |
            Can be used instead of "Progress value (sensor)" to provide a templated progress value.
            Must evaluate to a number between 0 and 1.
            If this template references entities, add matching triggers in "Custom automation triggers".
          selector:
            template:

        progress_display:
          name: Display mode
          default: split
          description: |
            How segments are rendered.
            "Split" shows segments side by side.
            "Layered" overlaps segments with gradient transitions.
          selector:
            select:
              mode: dropdown
              options:
                - label: Split
                  value: split
                - label: Layered
                  value: layered

        segments:
          name: Segments
          description: |
            The segments of the progress bar.
            Between 1 and 4 segments are supported.
            The "Size" values of all segments must sum to exactly 1.0.
          selector:
            object:
              multiple: true
              label_field: label
              fields:
                value:
                  label: Size
                  required: true
                  selector:
                    number:
                      min: 0
                      max: 1
                      step: 0.01

                fill_color:
                  label: Fill color
                  required: true
                  selector:
                    select:
                      mode: dropdown
                      options:
                        - label: red
                          value: red
                        - label: orange
                          value: orange
                        - label: yellow
                          value: yellow
                        - label: green
                          value: green
                        - label: mint
                          value: mint
                        - label: teal
                          value: teal
                        - label: cyan
                          value: cyan
                        - label: blue
                          value: blue
                        - label: indigo
                          value: indigo
                        - label: purple
                          value: purple
                        - label: pink
                          value: pink
                        - label: brown
                          value: brown
                        - label: gray
                          value: gray
                        - label: gray2
                          value: gray2
                        - label: gray3
                          value: gray3
                        - label: gray4
                          value: gray4
                        - label: gray5
                          value: gray5
                        - label: gray6
                          value: gray6

                track_color:
                  label: Track color
                  selector:
                    select:
                      mode: dropdown
                      options:
                        - label: gray
                          value: gray
                        - label: red
                          value: red
                        - label: orange
                          value: orange
                        - label: yellow
                          value: yellow
                        - label: green
