                track_fill:
                  label: Track fill
                  selector:
                    select:
                      mode: dropdown
                      options:
                        - label: Solid
                          value: solid
                        - label: Hatched
                          value: hatched

                label:
                  label: Label
                  selector:
                    text:

    header_left:
      name: Header left
      icon: mdi:format-header-1
      input:
        header_left_sensor:
          name: Value (sensor)
          default: sensor.dummy_non_existent_sensor
          description: A sensor whose state provides the header left text.
